server:
  port: 8080

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: "jdbc:oracle:thin:@BlueAutoDB_high?TNS_ADMIN=C:/BLUE/Project/blue/OracleCloud/Wallet_BlueAutoDB"
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:MEMORIA}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 - dev 환경에서는 client-id 설정 시에만 활성화
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         kakao:
  #           client-id: ${KAKAO_CLIENT_ID}
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 2592000000

cors:
  allowed-origins: "http://localhost:3000"

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.brp.memoria: DEBUG
